<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redactar | Lab .101</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .form-control { background-color: #0f172a; border: 1px solid #334155; color: white; }
        .form-control:focus { background-color: #0f172a; color: white; border-color: #38bdf8; box-shadow: none; }
        .btn-primary { background-color: #38bdf8; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <a href="/" class="text-info text-decoration-none small"><i class="bi bi-arrow-left"></i> Volver al Feed</a>
                <div class="card p-4 mt-3 shadow">
                    <h2 class="fw-bold text-white mb-4"><i class="bi bi-pencil-square text-warning me-2"></i>Nueva Entrada</h2>
                    
                    <form action="/nuevo" method="POST">
                        <div class="mb-3">
                            <label class="form-label text-secondary">Título del Pensamiento</label>
                            <input type="text" name="titulo" class="form-control" placeholder="Ej: Avances en el Laboratorio" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary">Contenido</label>
                            <textarea name="contenido" rows="8" class="form-control" placeholder="Escribí acá lo que pasó hoy..." required></textarea>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">PUBLICAR EN EL NODO</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
